<Macro IndagaBase $host $domain $apache>
<VirtualHost *:80>
	ServerAdmin webmaster@localhost

	ServerName $host.$domain
	ServerAlias www.$host.$domain

	Redirect permanent / https://$host.$domain/

	<Directory />
		Options +FollowSymLinks
		AllowOverride None
	</Directory>

	ErrorLog /var/log/$apache/$host.$domain-error.log

	# Possible values include: debug, info, notice, warn, error, crit,
	# alert, emerg.
	LogLevel warn
	#LogLevel debug

	LogFormat "%{forensic-id}n %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
	CustomLog /var/log/$apache/$host.$domain-access.log combined
</VirtualHost>
</Macro>

<Macro IndagaSSLHeader $host $domain>
<IfModule mod_ssl.c>
	<VirtualHost *:443>
		ServerAdmin webmaster@localhost

		ServerName $host.$domain
		ServerAlias www.$host.$domain

		DocumentRoot /var/www/$host.$domain
		Options +FollowSymLinks

		UseCanonicalName on
		ProxyPreserveHost on
		ProxyRequests Off

		SSLProxyEngine on
		SSLProxyVerify none
		SSLProxyCheckPeerCN off
		SSLProxyCheckPeerName off
</Macro>

<Macro IndagaSSLFooter $host $domain $apache>
		ProxyReceiveBufferSize 512
		RewriteEngine On

		<Directory />
			Options +FollowSymLinks
			AllowOverride None
		</Directory>
		<Directory /var/www/$host.$domain/>
			Options All +Indexes +FollowSymLinks +MultiViews
			AllowOverride All
			Order allow,deny
			allow from all
		</Directory>

		SSLEngine on
		SSLCertificateFile /etc/$apache/ssl.crt/$domain.crt
		SSLCertificateKeyFile /etc/$apache/ssl.crt/$domain.key
		SSLCertificateChainFile /etc/$apache/ssl.crt/ca-bundle-$domain.crt
		SSLCACertificatePath  /etc/ssl/certs/

		ErrorLog /var/log/$apache/$host.$domain-error.log

		# Possible values include: debug, info, notice, warn, error, crit,
		# alert, emerg.
		LogLevel warn
		#LogLevel debug

		LogFormat "%{forensic-id}n %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
		CustomLog /var/log/$apache/$host.$domain-access.log combined
	</VirtualHost>
</IfModule>
</Macro>

<Macro VHostIndagaSSL $host $domain $apache>
	Use IndagaBase $host $domain $apache
	Use IndagaSSLHeader $host $domain
	Use IndagaSSLFooter $host $domain $apache
</Macro>

<Macro VHostIndagaProxySSL $host $domain $apache>
	Use IndagaBase $host $domain $apache
	Use IndagaSSLHeader $host $domain
		ProxyPass /auth http://localhost:8080 retry=0
		ProxyPassReverse /auth http://localhost:8080 retry=0
		ProxyPass /connector http://localhost:8980 retry=0
		ProxyPassReverse /connector http://localhost:8980 retry=0
		ProxyPass /${PARTICIPANT} http://localhost:9080/${PARTICIPANT} retry=0
		ProxyPassReverse /${PARTICIPANT} http://localhost:9080/${PARTICIPANT} retry=0

		ProxyPass / http://localhost:8080/ retry=0
		ProxyPassReverse / http://localhost:8080/ retry=0
	Use IndagaSSLFooter $host $domain $apache
</Macro>

Use VHostIndagaProxySSL ${SUBDOMAIN} ${DOMAIN} ${APACHE}
