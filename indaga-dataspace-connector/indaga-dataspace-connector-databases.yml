version: '3.8'
name: indaga
services:
  postgres:
    image: "postgis/postgis:15-3.3"
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: indaga
      POSTGRES_PASSWORD: ${INDAGA_POSTGRES_PASSWORD}
      POSTGRES_DB: indaga
    volumes:
      - pg_connector_data:/var/lib/postgresql/data
  minio:
    image: "minio/minio:latest"
    ports:
      - "9090:9000"
      - "9091:9091"
    restart: always
    environment:
      MINIO_ROOT_USER: indaga
      MINIO_ROOT_PASSWORD: ${INDAGA_MINIO_PASSWORD}
    volumes:
      - s3_connector_data:/data
      - s3_connector_config:/root/.minio
    command: server --console-address :9091 /data
volumes:
  pg_connector_data:
  s3_connector_data:
  s3_connector_config:
